# Hypridle config (Not used with DMS)

general {
    lock_cmd = pidof hyprlock || hyprlock                   # runs hyprlock if it is not already running
    unlock_cmd = killall hyprlock                           # kills hyprlock when unlocking
    before_sleep_cmd = loginctl lock-session                # lock before sleep
    after_sleep_cmd = hyprctl dispatch dpms on              # lock screen after sleep
    ignore_dbus_inhibit = false
}

# Lower the brightness
listener {
    timeout = 120         # 2 min
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Lock the system
listener {
    timeout = 210              # 3.5 min
    on-timeout = loginctl lock-session
    on-resume = notify-send -i $back "System Unlocked"
}

# Turn off screen
listener {
    timeout = 300             # 5 min
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

