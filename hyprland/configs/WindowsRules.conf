# Window Rules
# See https://wiki.hyprland.org/Configuring/Window-Rules
# See https://wiki.hyprland.org/Configuring/Workspace-Rules

# === Ignore maximize requests from apps === #
windowrule {
  name = windowrule-3
  suppress_event = maximize
  match:class = .*
}

# === Kitty Floating === #
windowrule {
  name = windowrule-1
  float = on
  match:class = ^(kitty)$
  match:title = kitty
}

# === Fix some dragging issues with XWayland === #
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}

# === Avoid idle for fullscreen apps === #
windowrule {
  name = windowrule-7
  idle_inhibit = fullscreen
  match:class = ^.*$
}

windowrule {
  name = windowrule-8
  idle_inhibit = fullscreen
  match:title = ^.*$
}

windowrule {
  name = windowrule-9
  idle_inhibit = fullscreen
  match:fullscreen = 1
}

# === Thunar === #
windowrule {
  name = windowrule-6
  center = on
  float = on
  match:class = ([Tt]hunar)
  match:title = negative:(.*[Tt]hunar.*)
}

windowrule {
  name = windowrule-10
  float = on
  match:class = (xdg-desktop-portal-gtk)
}

windowrule {
  name = windowrule-11
  float = on
  match:class = ^([Rr]ofi)$
}

windowrule {
  name = windowrule-13
  float = on
  match:class = ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$
}

windowrule {
  name = windowrule-14
  float = on
  match:class = ^(nwg-look|qt5ct|qt6ct)$
}

windowrule {
  name = windowrule-16
  float = on
  match:class = ^(nm-applet|nm-connection-editor|blueman-manager)$
}

windowrule {
  name = windowrule-17
  float = on
  match:class = ^([Bb]aobab|org.gnome.[Bb]aobab)$ # Disk usage analyzer
}

windowrule {
  name = windowrule-18
  float = on
  match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
}

windowrule {
  name = windowrule-20
  float = on
  match:class = (codium|codium-url-handler|VSCodium)
  match:title = negative:(.*codium.*|.*VSCodium.*)
}

windowrule {
  name = windowrule-21
  float = on
  match:class = ^([Ss]team)$
  match:title = negative:^([Ss]team)$
}

windowrule {
  name = windowrule-22
  float = on
  match:class = (electron)
  match:title = (Add Folder to Workspace)
}

windowrule {
  name = windowrule-23
  fullscreen = on
  match:class = ^(gamescope)$
}

# Default floats
windowrule {
  name = windowrule-24
  float = on
  match:title = ^(pavucontrol)$
}

windowrule {
  name = windowrule-25
  float = on
  match:title = ^(blueman-manager)$
}

windowrule {
  name = windowrule-26
  float = on
  match:title = ^(nm-connection-editor)$
}

windowrule {
  name = windowrule-27
  float = on
  match:title = ^(qalculate-gtk)$
}

windowrule {
  name = windowrule-28
  float = on
  size = 700 600
  center = on
  match:class = (.*org.pulseaudio.pavucontrol.*)
}

windowrule {
  name = windowrule-32
  idle_inhibit = fullscreen
  match:class = ([window])
}

# === nwg-look === #
windowrule {
  name = windowrule-33
  float = on
  size = 700 600
  move = ((monitor_w*0.1)) ((monitor_h*0.2))
  pin = on
  match:class = (nwg-look)
}


# === Mission Center === #
windowrule {
  name = windowrule-34
  float = on
  pin = on
  center = on
  size = 900 600
  match:class = (io.missioncenter.MissionCenter)
}


# === Mission Center Preference Window === #
windowrule {
  name = windowrule-35
  float = on
  pin = on
  center = on
  match:class = (missioncenter)
  match:title = ^(Preferences)$
}


# === Float and center file pickers === #
windowrule {
  name = windowrule-36
  float = on
  center = on
  match:class = xdg-desktop-portal-gtk
  match:title = ^(Open.*Files?|Save.*Files?|All Files|Save)
}

# === Browser PIP === #
windowrule {
  name = windowrule-37
  float = on
  pin = on
  move = ((monitor_w*0.695)) ((monitor_h*0.04))
  match:title = ^(Picture-in-Picture)$
}

# ===================== #
# === DMS Defaults ==== #
# ===================== #
windowrule = tile on, match:class ^(org\.wezfurlong\.wezterm)$

windowrule = rounding 12, match:class ^(org\.gnome\.)

windowrule = tile on, match:class ^(gnome-control-center)$
windowrule = tile on, match:class ^(pavucontrol)$
windowrule = tile on, match:class ^(nm-connection-editor)$

windowrule = float on, match:class ^(gnome-calculator)$
windowrule = float on, match:class ^(galculator)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.gnome\.Nautilus)$
windowrule = float on, match:class ^(steam)$
windowrule = float on, match:class ^(xdg-desktop-portal)$

windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(zoom)$

# DMS windows floating by default
# ! Hyprland doesn't size these windows correctly so disabling by default here
# windowrule = float on, match:class ^(org.quickshell)$

layerrule = no_anim on, match:namespace ^(quickshell)$
