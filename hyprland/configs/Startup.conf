# Things that run at startup
$terminal = kitty
$scripts = /home/kurami/.config/hypr/scripts

exec-once = bash -c "echo auto > /sys/bus/pci/devices/0000:01:00.0/power/control" # Disable NVIDIA GPU (make it idle)
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target

# === Clipboard X11 to Wayland sync ==== #
exec-once = ~/.config/hypr/scripts/clipboard-x11-to-wayland.sh

