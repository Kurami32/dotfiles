# Windows Look
# See https://wiki.hyprland.org/Configuring/Variables

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(255,0,0)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    # see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2
    screen_shader = /home/kurami/.config/hypr/gamma.frag # Screen shader, I like to use more vivid colors xd -- Adjust to your liking.
    active_opacity = 1.0
    inactive_opacity = 0.9
    shadow {
        enabled = true
        range = 30
        render_power = 5
        color = rgba(00000070)
    }
    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 7
        passes = 1
        vibrancy = 0.1696
    }
}
